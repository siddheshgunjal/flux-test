<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Network Speed Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/css/index.css') }}">
</head>
<body class="bg-[#0a0a0a] text-gray-200 h-screen overflow-hidden flex flex-col">
    <!-- Animated Background -->
    <div class="flux-mesh-bg"></div>
    <div id="completion-overlay" class="completion-overlay"></div>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-start h-[calc(100vh-3.75rem)] px-3 sm:px-4 py-3 sm:py-5 overflow-hidden">
        
        <!-- Header -->
        <div class="w-full max-w-3xl mx-auto mb-3 sm:mb-5 text-center relative z-20">
            <div class="flex items-center justify-center mb-2 sm:mb-3">
                <!-- Flux Logo -->
                <img src="{{ url_for('static', filename='image/flux_square.webp') }}" alt="FluxTest Logo" class="w-[5rem] h-[5rem] sm:w-[5rem] sm:h-[5rem] object-contain text-cyan-400">
                <div>
                    <h1 class="text-4xl sm:text-4xl font-light tracking-tight text-white">
                        Flux<span class="text-cyan-400">Test</span>
                    </h1>
                </div>
            </div>

        </div>

        <!-- Server & Latency Info Bar -->
        <div class="w-full max-w-3xl mx-auto mb-3 sm:mb-5 relative z-10">
            <div class="flux-card rounded-2xl px-3 sm:px-6 py-2.5 sm:py-4">
                <div class="grid grid-cols-2 sm:flex sm:flex-wrap items-center justify-evenly gap-2 sm:gap-4">
                    <div class="flex items-center justify-start gap-1.5 sm:gap-2 min-w-0">
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <rect x="4" y="4" width="16" height="6" rx="2" stroke-width="2"></rect>
                            <rect x="4" y="14" width="16" height="6" rx="2" stroke-width="2"></rect>
                            <circle cx="8" cy="7" r="1" fill="currentColor" stroke="none"></circle>
                            <circle cx="8" cy="17" r="1" fill="currentColor" stroke="none"></circle>
                        </svg>
                        <span class="text-[14px] sm:text-xs text-gray-500 font-mono uppercase tracking-wider">Server</span>
                        <span id="server-name" class="text-[14px] sm:text-sm text-white font-mono truncate">--</span>
                    </div>
                    <div class="flex items-center justify-end gap-1.5 sm:gap-2">
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span class="text-[14px] sm:text-xs text-gray-500 font-mono uppercase tracking-wider">Latency</span>
                        <span id="ping-value" class="text-[14px] sm:text-sm font-mono text-cyan-400">--</span>
                        <span class="text-[14px] sm:text-xs text-gray-600 font-mono">ms</span>
                    </div>
                </div>
                <div class="flex items-center justify-center gap-1.5 sm:gap-2 pt-2 sm:pt-4">
                    <span id="server-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span id="server-health" class="text-[14px] sm:text-sm text-gray-500 font-mono">Checking...</span>
                </div>
            </div>
        </div>

        <!-- Main Test Interface -->
        <div class="w-full max-w-3xl grid grid-cols-1 md:grid-cols-2 gap-2 sm:gap-6 relative z-10">
            
            <!-- Download Test Card -->
            <div id="dl-card" class="flux-card w-full md:max-w-none mx-auto rounded-2xl sm:rounded-3xl p-2.5 sm:p-8 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/5 to-purple-500/5 opacity-0 transition-opacity duration-700" id="dl-bg-gradient"></div>
                
                <!-- Header -->
                <div class="flex items-center gap-2 sm:gap-4 mb-2 sm:mb-6 relative z-10">
                    <div class="w-7 h-7 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl bg-gradient-to-br from-cyan-500/20 to-purple-500/20 flex items-center justify-center border border-cyan-500/30 relative shadow-[0_0_30px_rgba(6,182,212,0.2)]">
                        <svg class="w-3.5 h-3.5 sm:w-9 sm:h-9 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        <div class="absolute -inset-1 bg-cyan-500/5 blur-xl opacity-0 transition-opacity duration-300" id="dl-icon-glow"></div>
                    </div>
                    <div>
                        <h3 class="text-base sm:text-xl font-semibold text-white">Download</h3>
                        <p id="download-size" class="sm:block text-xs sm:text-sm text-gray-500 font-mono">---</p>
                    </div>
                </div>

                <!-- Results -->
                <div class="relative z-10">
                    <!-- Progress Ring with speed inside -->
                    <div class="relative w-28 h-28 sm:w-48 sm:h-48 mx-auto">
                        <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                            <!-- Track -->
                            <circle class="stroke-[2] stroke-white/10" cx="50" cy="50" r="44" fill="none"/>
                            <!-- Progress arc -->
                            <circle id="dl-circle" class="stroke-cyan-400 stroke-[3] fill-none transition-all duration-300 ease-out"
                                cx="50" cy="50" r="44" fill="none"
                                stroke-linecap="round"
                                stroke-dasharray="276.5"
                                stroke-dashoffset="276.5"/>
                        </svg>
                        <!-- Speed label centred inside the ring -->
                        <div class="ring-label">
                            <span id="dl-speed" class="text-2xl sm:text-4xl font-light tracking-tighter text-white leading-none">0</span>
                            <span class="text-[12px] sm:text-base font-mono text-cyan-400 mt-0.5 sm:mt-1">Mbps</span>
                        </div>
                    </div>

                    <!-- Timing -->
                    <div class="grid grid-cols-2 gap-1.5 sm:gap-4 text-[10px] sm:text-sm font-mono mt-2 sm:mt-6">
                        <div class="bg-white/5 rounded-lg p-1.5 sm:p-3 border border-white/5">
                            <div class="text-gray-500 text-[9px] sm:text-xs uppercase mb-1">Elapsed</div>
                            <div id="dl-timer" class="text-white text-[11px] sm:text-base">00:00</div>
                        </div>
                        <div class="bg-white/5 rounded-lg p-1.5 sm:p-3 border border-white/5">
                            <div class="text-gray-500 text-[9px] sm:text-xs uppercase mb-1">Downloaded</div>
                            <div id="dl-bytes" class="text-cyan-400 font-mono text-[11px] sm:text-base">0 MB</div>
                        </div>
                    </div>
                </div>

                <!-- Status Glow -->
                <div id="dl-glow" class="absolute -inset-1 bg-cyan-500/10 rounded-full blur-2xl opacity-0 transition-opacity duration-50"></div>
            </div>

            <!-- Upload Test Card -->
            <div id="ul-card" class="flux-card w-full md:max-w-none mx-auto rounded-2xl sm:rounded-3xl p-2.5 sm:p-8 relative overflow-hidden transition-all duration-500">
                <div class="absolute inset-0 bg-gradient-to-br from-purple-500/5 to-cyan-500/5 opacity-0 transition-opacity duration-700" id="ul-bg-gradient"></div>
                
                <!-- Header -->
                <div class="flex items-center gap-2 sm:gap-4 mb-2 sm:mb-6 relative z-10">
                    <div class="w-7 h-7 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl bg-gradient-to-br from-purple-500/20 to-cyan-500/20 flex items-center justify-center border border-purple-500/30 relative shadow-[0_0_30px_rgba(99,102,241,0.2)]">
                        <svg class="w-3.5 h-3.5 sm:w-9 sm:h-9 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                        <div class="absolute -inset-1 bg-purple-500/5 blur-xl opacity-0 transition-opacity duration-300" id="ul-icon-glow"></div>
                    </div>
                    <div>
                        <h3 class="text-base sm:text-xl font-semibold text-white">Upload</h3>
                        <p id="upload-size" class="sm:block text-xs sm:text-sm text-gray-500 font-mono">---</p>
                    </div>
                </div>

                <!-- Results -->
                <div class="relative z-10">
                    <!-- Progress Ring with speed inside -->
                    <div class="relative w-28 h-28 sm:w-48 sm:h-48 mx-auto">
                        <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                            <!-- Track -->
                            <circle class="stroke-[2] stroke-white/10" cx="50" cy="50" r="44" fill="none"/>
                            <!-- Progress arc -->
                            <circle id="ul-circle" class="stroke-purple-400 stroke-[3] fill-none transition-all duration-300 ease-out"
                                cx="50" cy="50" r="44" fill="none"
                                stroke-linecap="round"
                                stroke-dasharray="276.5"
                                stroke-dashoffset="276.5"/>
                        </svg>
                        <!-- Speed label centred inside the ring -->
                        <div class="ring-label">
                            <span id="ul-speed" class="text-2xl sm:text-4xl font-light tracking-tighter text-white leading-none">0</span>
                            <span class="text-[12px] sm:text-base font-mono text-purple-400 mt-0.5 sm:mt-1">Mbps</span>
                        </div>
                    </div>

                    <!-- Timing -->
                    <div class="grid grid-cols-2 gap-1.5 sm:gap-4 text-[10px] sm:text-sm font-mono mt-2 sm:mt-6">
                        <div class="bg-white/5 rounded-lg p-1.5 sm:p-3 border border-white/5">
                            <div class="text-gray-500 text-[9px] sm:text-xs uppercase mb-1">Elapsed</div>
                            <div id="ul-timer" class="text-white text-[11px] sm:text-base">00:00</div>
                        </div>
                        <div class="bg-white/5 rounded-lg p-1.5 sm:p-3 border border-white/5">
                            <div class="text-gray-500 text-[9px] sm:text-xs uppercase mb-1">Uploaded</div>
                            <div id="ul-bytes" class="text-purple-400 font-mono text-[11px] sm:text-base">0 MB</div>
                        </div>
                    </div>
                </div>

                <!-- Status Glow -->
                <div id="ul-glow" class="absolute -inset-1 bg-purple-500/10 rounded-full blur-2xl opacity-0 transition-opacity duration-500"></div>
            </div>
        </div>

        <!-- Start Button -->
        <div class="w-full max-w-3xl mx-auto mt-3 sm:mt-8 relative z-10">
            <button id="start-all-btn" class="flux-button w-full py-3 sm:py-4 rounded-2xl bg-gradient-to-r from-cyan-500/20 to-purple-500/20 border border-white/20 hover:border-cyan-400/50 transition-all duration-300 group relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/0 via-cyan-500/20 to-cyan-500/0 transform -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                <span class="relative z-10 flex items-center justify-center gap-2 sm:gap-3 text-white font-semibold tracking-wide text-sm sm:text-lg">
                    <svg id="btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    <span id="btn-label">Start Full Speed Test</span>
                </span>
            </button>
            <p id="upload-delay-hint" style="margin-top:0.5rem; min-height:1rem; text-align:center; font-size:0.75rem; color:#f9ad16; opacity:0; transition:opacity 0.25s ease;"></p>
        </div>

    </main>

    <!-- Status Bar -->
    <div id="status-bar" class="status-bar"></div>

    <!-- Footer -->
    <footer class="z-10 py-2 px-4 border-t border-white/5 bg-black/40 backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-[10px] sm:text-xs text-gray-600 font-mono">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                    <span>FluxTest v0.1.0</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <span>Made by <a href="https://siddheshgunjal.github.io" target="_blank" class="text-cyan-400 hover:underline">Siddhesh Gunjal</a></span>
            </div>
        </div>
    </footer>

    <!-- Floating Particles Container -->
    <div id="particles" class="fixed inset-0 z-0 pointer-events-none overflow-hidden"></div>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
